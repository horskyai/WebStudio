<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-02: Linear Hero</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-base: #030712;
            --border-color: rgba(255, 255, 255, 0.05);
            --color-primary: #6366f1;
            --color-secondary: #ec4899;
            --color-accent: #10b981;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body, html { background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-sans); height: 100%; width: 100%; overflow: hidden; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #030712; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transition: clip-path 1.2s cubic-bezier(0.76, 0, 0.24, 1); }
        .loader-center { text-align: center; position: relative; }
        .loader-ring { width: 130px; height: 130px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.02); border-top-color: var(--color-primary); border-bottom-color: var(--color-secondary); animation: spin 1.5s cubic-bezier(0.5,0,0.5,1) infinite; margin-bottom: 2rem; }
        .loader-percentage { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 1.2rem; font-weight: bold; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #hero { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 2rem; }
        .linear-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; z-index: -1; pointer-events: none; }
        .hero-meta { font-family: var(--font-mono); font-size: 0.8rem; color: var(--color-accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; transform: translateY(20px); }
        .title-container { overflow: hidden; margin-bottom: 1.5rem; }
        .hero-title { font-size: 4.5rem; font-weight: 850; letter-spacing: -0.04em; line-height: 1.05; transform: translateY(110%); background: linear-gradient(to bottom, #ffffff 40%, var(--text-muted) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-desc { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; line-height: 1.6; margin-bottom: 3.5rem; opacity: 0; transform: translateY(20px); }
        .cta-btn { background: rgba(255,255,255,0.02); color: #fff; border: 1px solid var(--border-color); padding: 1rem 2.2rem; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; backdrop-filter: blur(12px); opacity: 0; transform: translateY(20px); transition: background 0.3s, border-color 0.3s; }
        .cta-btn::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent, var(--color-primary), transparent 35%); animation: rotateBeam 4s linear infinite; z-index: -1; opacity: 0; transition: opacity 0.3s; }
        .cta-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }
        .cta-btn:hover::before { opacity: 1; }
        @keyframes rotateBeam { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="loader-center">
            <div class="loader-ring"></div>
            <div class="loader-percentage" id="load-num">0%</div>
        </div>
    </div>
    <main id="hero">
        <div class="linear-grid"></div>
        <span class="hero-meta" id="meta-el">SYSTEM STABLE // RELEASE v2.6</span>
        <div class="title-container">
            <h1 class="hero-title" id="title-el">Navrhujeme budoucnost rozhraní.</h1>
        </div>
        <p class="hero-desc" id="desc-el">Kombinace plynulých časových os, subpixelových transformací a přísného minimalismu. Navrženo pro technologické lídry.</p>
        <button class="cta-btn" id="btn-el">INITIALIZE CONSOLE</button>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadNum = document.getElementById('load-num');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 8) + 2;
                if (progress >= 100) { progress = 100; clearInterval(interval); revealPage(); }
                loadNum.innerText = progress + '%';
            }, 30);
        });
        function revealPage() {
            document.getElementById('preloader').style.clipPath = 'polygon(0 0, 100% 0, 100% 0, 0 0)';
            const tl = gsap.timeline();
            gsap.set(["#meta-el","#desc-el","#btn-el"], { opacity: 0, y: 20 });
            gsap.set("#title-el", { y: "110%" });
            tl.to("#meta-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" })
              .to("#title-el", { y: 0, duration: 1.2, ease: "power4.out" }, "-=0.6")
              .to("#desc-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, "-=0.8")
              .to("#btn-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, "-=0.6");
        }
    </script>
</body>
</html>
