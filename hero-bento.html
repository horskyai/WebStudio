<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-07: Bento Tech Hero</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-base: #04060a;
            --bg-card: #0b0f17;
            --border-color: rgba(99, 102, 241, 0.1);
            --color-primary: #6366f1;
            --color-secondary: #ec4899;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body, html { background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-sans); height: 100%; width: 100%; overflow: hidden; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transition: clip-path 1.2s cubic-bezier(0.76, 0, 0.24, 1); }
        .loader-center { text-align: center; }
        .decrypt-box { font-family: var(--font-mono); font-size: 1.8rem; font-weight: bold; color: var(--color-primary); letter-spacing: -0.05em; margin-bottom: 1rem; text-shadow: 0 0 10px rgba(99, 102, 241, 0.2); }
        .loader-bar-bg { width: 200px; height: 1px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; margin: 0 auto; }
        .loader-bar-fill { position: absolute; top: 0; left: 0; width: 0; height: 100%; background: var(--color-primary); }
        #hero { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .bento-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; padding: 0 2rem; }
        .hero-info-wrap { margin-bottom: 3rem; text-align: center; }
        .hero-tag { font-family: var(--font-mono); font-size: 0.8rem; color: var(--color-primary); letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 1rem; display: block; opacity: 0; transform: translateY(15px); }
        .title-mask { overflow: hidden; margin-bottom: 1rem; }
        .hero-title { font-size: 3rem; font-weight: 850; letter-spacing: -0.04em; line-height: 1.1; transform: translateY(110%); }
        .bento-grid { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 120px; gap: 1rem; }
        .bento-cell { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: space-between; text-align: left; opacity: 0; transform: translateY(20px); }
        .bc-large { grid-column: span 2; grid-row: span 2; }
        .bc-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .bc-desc { font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="loader-center">
            <div class="decrypt-box" id="decrypt-val">000000</div>
            <div class="loader-bar-bg">
                <div class="loader-bar-fill" id="loader-fill-el"></div>
            </div>
        </div>
    </div>
    <main id="hero">
        <div class="bento-wrapper">
            <div class="hero-info-wrap">
                <span class="hero-tag" id="tag-el">BENTO MODULE INTEGRATION</span>
                <div class="title-mask">
                    <h1 class="hero-title" id="title-el">Asymetrický systém.</h1>
                </div>
            </div>
            <div class="bento-grid">
                <div class="bento-cell bc-large">
                    <div>
                        <h3 class="bc-title">Datový tok</h3>
                        <p class="bc-desc">Realtime vizualizace serverových požadavků přenášených přes asynchronní sockety.</p>
                    </div>
                </div>
                <div class="bento-cell">
                    <div>
                        <h3 class="bc-title">Uzel 01</h3>
                        <p class="bc-desc">Aktivní stav.</p>
                    </div>
                </div>
                <div class="bento-cell">
                    <div>
                        <h3 class="bc-title">Uzel 02</h3>
                        <p class="bc-desc">Zabezpečeno.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const decryptVal = document.getElementById('decrypt-val');
            const loaderFill = document.getElementById('loader-fill-el');
            const targetWord = "SYSTEM";
            const chars = "10XYZ#@$%&*";
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 1;
                if (progress >= 100) { progress = 100; clearInterval(interval); revealPage(); }
                loaderFill.style.width = progress + '%';
                const iterations = (progress / 100) * targetWord.length;
                decryptVal.innerText = targetWord.split("").map((char, index) => {
                    if (index < iterations) return targetWord[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
            }, 40);
        });
        function revealPage() {
            document.getElementById('preloader').style.clipPath = 'polygon(0 0, 100% 0, 100% 0, 0 0)';
            animateHero();
        }
        function animateHero() {
            const tl = gsap.timeline();
            gsap.set("#tag-el", { opacity: 0, y: 15 });
            gsap.set("#title-el", { y: "110%" });
            gsap.set(".bento-cell", { opacity: 0, y: 20 });
            tl.to("#tag-el", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" })
              .to("#title-el", { y: 0, duration: 1.0, ease: "power4.out" }, "-=0.4")
              .to(".bento-cell", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out", stagger: 0.1 }, "-=0.6");
        }
    </script>
</body>
</html>
