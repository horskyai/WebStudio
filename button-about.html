<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-XX: About Chrome Button</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 40%, rgba(60,60,80,0.8) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(40,30,20,0.6) 0%, transparent 50%),
                        #0a0a0c;
            overflow: hidden;
        }

        /* Světelné paprsky na pozadí */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%),
                linear-gradient(225deg, rgba(255,255,255,0.02) 0%, transparent 40%);
            pointer-events: none;
        }

        /* Wrapper s dekorativními oranžovými linkami */
        .btn-scene {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Dekorativní oranžové linky okolo */
        .deco {
            position: absolute;
            pointer-events: none;
        }

        /* Horní linka */
        .deco-top {
            top: -28px; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 2px;
            background: linear-gradient(90deg, transparent, #c87941, transparent);
        }

        /* Spodní linka */
        .deco-bottom {
            bottom: -28px; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 2px;
            background: linear-gradient(90deg, transparent, #c87941, transparent);
        }

        /* Levá linka */
        .deco-left {
            left: -30px; top: 50%;
            transform: translateY(-50%);
            width: 2px; height: 60px;
            background: linear-gradient(180deg, transparent, #c87941, transparent);
        }

        /* Pravá linka */
        .deco-right {
            right: -30px; top: 50%;
            transform: translateY(-50%);
            width: 2px; height: 60px;
            background: linear-gradient(180deg, transparent, #c87941, transparent);
        }

        /* Oranžové tečky v rozích */
        .deco-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #c87941;
            position: absolute;
        }
        .deco-dot-tl { top: -38px; left: -22px; background: #5bc4e8; }
        .deco-dot-br { bottom: -38px; right: -22px; }
        .deco-dot-bc { bottom: -38px; left: 50%; transform: translateX(-50%); }

        /* Modrá tečka vlevo */
        .deco-dot-ml { top: 20%; left: -38px; width: 4px; height: 4px; background: #5bc4e8; }

        /* Hlavní button */
        .btn-chrome {
            position: relative;
            width: 320px;
            height: 210px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .btn-chrome:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }

        .btn-chrome:active {
            transform: scale(0.97);
        }

        .btn-chrome svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
    </style>
</head>
<body>

    <div class="btn-scene">
        <!-- Dekorativní prvky -->
        <div class="deco deco-top"></div>
        <div class="deco deco-bottom"></div>
        <div class="deco deco-left"></div>
        <div class="deco deco-right"></div>
        <div class="deco deco-dot deco-dot-tl"></div>
        <div class="deco deco-dot deco-dot-br"></div>
        <div class="deco deco-dot deco-dot-bc"></div>
        <div class="deco deco-dot deco-dot-ml"></div>

        <button class="btn-chrome">
            <svg viewBox="0 0 320 210" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>

                    <!-- Chrome hlavní fill — tmavý střed, světlý okraj -->
                    <radialGradient id="chromeFill" cx="50%" cy="35%" r="70%">
                        <stop offset="0%"   stop-color="#6a7a8a"/>
                        <stop offset="40%"  stop-color="#3a4550"/>
                        <stop offset="100%" stop-color="#1a2028"/>
                    </radialGradient>

                    <!-- Horní reflexní lesk -->
                    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
                        <stop offset="35%"  stop-color="rgba(255,255,255,0.15)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                    </linearGradient>

                    <!-- Spodní světlý odraz -->
                    <linearGradient id="bottomShine" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
                        <stop offset="70%"  stop-color="rgba(200,180,160,0.12)"/>
                        <stop offset="100%" stop-color="rgba(200,160,120,0.25)"/>
                    </linearGradient>

                    <!-- Okraj — chrome prstenec -->
                    <linearGradient id="rimGrad" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%"   stop-color="#c8d0d8"/>
                        <stop offset="25%"  stop-color="#606870"/>
                        <stop offset="50%"  stop-color="#a0aab4"/>
                        <stop offset="75%"  stop-color="#404850"/>
                        <stop offset="100%" stop-color="#b0bac4"/>
                    </linearGradient>

                    <!-- Vnější oranžový glow okraj -->
                    <linearGradient id="outerRim" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%"   stop-color="rgba(200,120,60,0.6)"/>
                        <stop offset="50%"  stop-color="rgba(180,100,40,0.2)"/>
                        <stop offset="100%" stop-color="rgba(200,130,70,0.5)"/>
                    </linearGradient>

                    <!-- Play trojúhelník — chrome gradient -->
                    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%"   stop-color="#d0d8e0"/>
                        <stop offset="40%"  stop-color="#808890"/>
                        <stop offset="100%" stop-color="#404850"/>
                    </linearGradient>

                    <!-- Play lesk nahoře -->
                    <linearGradient id="playShine" x1="0" y1="0" x2="0.3" y2="1">
                        <stop offset="0%"   stop-color="rgba(255,255,255,0.6)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                    </linearGradient>

                    <!-- Text gradient -->
                    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%"   stop-color="#c0c8d0"/>
                        <stop offset="100%" stop-color="#707880"/>
                    </linearGradient>

                    <!-- Blur pro vnější shadow -->
                    <filter id="outerShadow" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.7)"/>
                    </filter>

                    <!-- Blur pro play glow -->
                    <filter id="playGlow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>

                    <!-- Clip pro vnitřní obsah -->
                    <clipPath id="btnClip">
                        <rect x="10" y="8" width="300" height="194" rx="44"/>
                    </clipPath>

                </defs>

                <!-- Vnější oranžový rim / glow -->
                <rect x="4" y="3" width="312" height="204" rx="50"
                      fill="none" stroke="url(#outerRim)" stroke-width="3"
                      filter="url(#outerShadow)"/>

                <!-- Hlavní chrome tělo -->
                <rect x="10" y="8" width="300" height="194" rx="44"
                      fill="url(#chromeFill)"/>

                <!-- Horní bílý lesk (velká plocha nahoře) -->
                <rect x="10" y="8" width="300" height="194" rx="44"
                      fill="url(#topShine)"
                      clip-path="url(#btnClip)"/>

                <!-- Spodní teplý odraz -->
                <rect x="10" y="8" width="300" height="194" rx="44"
                      fill="url(#bottomShine)"
                      clip-path="url(#btnClip)"/>

                <!-- Chrome rim okraj (světlý prstenec) -->
                <rect x="10" y="8" width="300" height="194" rx="44"
                      fill="none" stroke="url(#rimGrad)" stroke-width="4"/>

                <!-- Vnitřní tenká bílá linka -->
                <rect x="16" y="14" width="288" height="182" rx="40"
                      fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

                <!-- PLAY trojúhelník — tělo -->
                <path d="M142 72 L142 122 L188 97 Z"
                      fill="url(#playGrad)"
                      filter="url(#playGlow)"/>

                <!-- Play — horní lesk -->
                <path d="M142 72 L142 97 L165 84 Z"
                      fill="url(#playShine)"
                      opacity="0.7"/>

                <!-- Play — okraj / rim -->
                <path d="M142 72 L142 122 L188 97 Z"
                      fill="none"
                      stroke="rgba(255,255,255,0.3)"
                      stroke-width="1.5"
                      stroke-linejoin="round"/>

                <!-- Text ABOUT // > -->
                <text x="160" y="158"
                      font-family="'Courier New', 'Fira Code', monospace"
                      font-size="15"
                      font-weight="600"
                      letter-spacing="3"
                      text-anchor="middle"
                      fill="url(#textGrad)">ABOUT // &gt;</text>

                <!-- Text — jemný highlight -->
                <text x="160" y="158"
                      font-family="'Courier New', 'Fira Code', monospace"
                      font-size="15"
                      font-weight="600"
                      letter-spacing="3"
                      text-anchor="middle"
                      fill="rgba(255,255,255,0.15)">ABOUT // &gt;</text>

            </svg>
        </button>
    </div>

</body>
</html>
