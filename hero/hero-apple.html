<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-03: Apple Editorial Hero</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-base: #000000;
            --bg-card: #111111;
            --border-color: rgba(255, 255, 255, 0.1);
            --color-primary: #ffffff;
            --color-secondary: #86868b;
            --color-accent: #0071e3;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
            --font-serif: 'Playfair Display', Georgia, serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body, html { background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-sans); height: 100%; width: 100%; overflow: hidden; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transition: clip-path 1.2s cubic-bezier(0.76, 0, 0.24, 1); }
        .loader-center { text-align: center; position: relative; }
        .loader-ring { width: 130px; height: 130px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05); border-top-color: rgba(255,255,255,0.6); animation: spin 2s linear infinite; margin-bottom: 2rem; }
        .loader-percentage { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 1.2rem; font-weight: 300; color: var(--text-muted); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #hero { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 2rem; }
        .hero-meta { font-family: var(--font-mono); font-size: 0.8rem; color: var(--color-accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; transform: translateY(20px); }
        .title-container { overflow: hidden; margin-bottom: 1.5rem; }
        .hero-title { font-size: 4.5rem; font-weight: 300; font-family: var(--font-serif); font-style: italic; letter-spacing: -0.02em; line-height: 1.05; transform: translateY(110%); color: var(--text-main); }
        .hero-desc { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; line-height: 1.6; margin-bottom: 3.5rem; opacity: 0; transform: translateY(20px); }
        .cta-btn { background: transparent; color: var(--color-accent); border: none; padding: 0; font-size: 1rem; font-weight: 400; letter-spacing: 0; cursor: pointer; opacity: 0; transform: translateY(20px); text-decoration: underline; text-underline-offset: 3px; transition: opacity 0.2s; }
        .cta-btn:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="loader-center">
            <div class="loader-ring"></div>
            <div class="loader-percentage" id="load-num">0%</div>
        </div>
    </div>
    <main id="hero">
        <span class="hero-meta" id="meta-el">VISION PRO // COMPUTING</span>
        <div class="title-container">
            <h1 class="hero-title" id="title-el">Vítejte v éře prostorového designu.</h1>
        </div>
        <p class="hero-desc" id="desc-el">Neuvěřitelně jemná typografie kombinovaná s absolutní černou. Zážitek, který překračuje hranice běžného displeje.</p>
        <button class="cta-btn" id="btn-el">Koupit</button>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadNum = document.getElementById('load-num');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 8) + 2;
                if (progress >= 100) { progress = 100; clearInterval(interval); revealPage(); }
                loadNum.innerText = progress + '%';
            }, 30);
        });
        function revealPage() {
            document.getElementById('preloader').style.clipPath = 'polygon(0 0, 100% 0, 100% 0, 0 0)';
            const tl = gsap.timeline();
            gsap.set(["#meta-el","#desc-el","#btn-el"], { opacity: 0, y: 20 });
            gsap.set("#title-el", { y: "110%" });
            tl.to("#meta-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" })
              .to("#title-el", { y: 0, duration: 1.2, ease: "power4.out" }, "-=0.6")
              .to("#desc-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, "-=0.8")
              .to("#btn-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, "-=0.6");
        }
    </script>
</body>
</html>
