<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-14: Cyberpunk RGB Button</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080c10;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .btn-cyber {
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s ease, filter 0.3s ease;
        }
        .btn-cyber:hover {
            transform: scale(1.03);
            filter: brightness(1.2);
        }
        .btn-cyber:active { transform: scale(0.97); }

        /* RGB border animace */
        @keyframes rgbBorder {
            0%   { stroke: #00ffcc; }
            16%  { stroke: #00aaff; }
            33%  { stroke: #cc00ff; }
            50%  { stroke: #ff0080; }
            66%  { stroke: #ff8800; }
            83%  { stroke: #aaff00; }
            100% { stroke: #00ffcc; }
        }
        @keyframes rgbGlow {
            0%   { filter: drop-shadow(0 0 8px #00ffcc); }
            16%  { filter: drop-shadow(0 0 8px #00aaff); }
            33%  { filter: drop-shadow(0 0 8px #cc00ff); }
            50%  { filter: drop-shadow(0 0 8px #ff0080); }
            66%  { filter: drop-shadow(0 0 8px #ff8800); }
            83%  { filter: drop-shadow(0 0 8px #aaff00); }
            100% { filter: drop-shadow(0 0 8px #00ffcc); }
        }

        @keyframes circuitBlink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.15; }
        }

        @keyframes scanPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }

        .rgb-outer { animation: rgbBorder 4s linear infinite; }
        .rgb-inner { animation: rgbBorder 4s linear infinite 1s; }
        .btn-cyber .circuit { animation: circuitBlink 3s ease infinite; }
        .scan-anim { animation: scanPulse 2s ease infinite; }

        /* Text RGB gradient */
        @keyframes textRgb {
            0%   { fill: #00ffcc; }
            33%  { fill: #ff00aa; }
            66%  { fill: #00aaff; }
            100% { fill: #00ffcc; }
        }
        .text-rgb { animation: textRgb 3s linear infinite; }
        .text-rgb2 { animation: textRgb 3s linear infinite 1.5s; }
    </style>
</head>
<body>

<button class="btn-cyber">
    <svg width="480" height="160" viewBox="0 0 480 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Dark fill -->
            <linearGradient id="cyberFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#141c24"/>
                <stop offset="100%" stop-color="#0c1218"/>
            </linearGradient>

            <!-- Circuit pattern fill -->
            <pattern id="circuitPat" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                <line x1="0" y1="20" x2="15" y2="20" stroke="#00ffcc" stroke-width="0.5" opacity="0.3"/>
                <line x1="15" y1="20" x2="15" y2="8" stroke="#00ffcc" stroke-width="0.5" opacity="0.3"/>
                <line x1="15" y1="8" x2="30" y2="8" stroke="#00ffcc" stroke-width="0.5" opacity="0.3"/>
                <circle cx="15" cy="20" r="1.5" fill="#00ffcc" opacity="0.4"/>
                <circle cx="30" cy="8" r="1.5" fill="#ff00aa" opacity="0.35"/>
                <line x1="25" y1="30" x2="40" y2="30" stroke="#ff00aa" stroke-width="0.5" opacity="0.25"/>
            </pattern>

            <!-- Clip -->
            <clipPath id="cyberClip">
                <path d="M 20 10 L 460 10 L 470 25 L 470 135 L 460 150 L 20 150 L 10 135 L 10 25 Z"/>
            </clipPath>

            <!-- Outer glow filter -->
            <filter id="cyberGlow" x="-8%" y="-15%" width="116%" height="130%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
        </defs>

        <!-- Hlavní tělo -->
        <path d="M 20 10 L 460 10 L 470 25 L 470 135 L 460 150 L 20 150 L 10 135 L 10 25 Z"
              fill="url(#cyberFill)"/>

        <!-- Circuit pattern overlay -->
        <path d="M 20 10 L 460 10 L 470 25 L 470 135 L 460 150 L 20 150 L 10 135 L 10 25 Z"
              fill="url(#circuitPat)" opacity="0.7" class="circuit" clip-path="url(#cyberClip)"/>

        <!-- Vnější RGB border -->
        <path d="M 20 10 L 460 10 L 470 25 L 470 135 L 460 150 L 20 150 L 10 135 L 10 25 Z"
              fill="none" stroke-width="2.5" class="rgb-outer" filter="url(#cyberGlow)"/>

        <!-- Vnitřní RGB border (offset) -->
        <path d="M 24 16 L 456 16 L 464 28 L 464 132 L 456 144 L 24 144 L 16 132 L 16 28 Z"
              fill="none" stroke-width="1" class="rgb-inner" opacity="0.5"/>

        <!-- Rohové detaily - cyan brackets -->
        <!-- Levý horní -->
        <polyline points="10,40 10,25 20,10 50,10"
                  fill="none" stroke="#00ffcc" stroke-width="2.5" filter="url(#cyberGlow)"/>
        <!-- Pravý dolní -->
        <polyline points="470,120 470,135 460,150 430,150"
                  fill="none" stroke="#00ffcc" stroke-width="2.5" filter="url(#cyberGlow)"/>

        <!-- Rohové detaily - pink brackets -->
        <!-- Pravý horní -->
        <polyline points="430,10 460,10 470,25 470,55"
                  fill="none" stroke="#ff0080" stroke-width="2" filter="url(#cyberGlow)"/>
        <!-- Levý dolní -->
        <polyline points="50,150 20,150 10,135 10,105"
                  fill="none" stroke="#ff0080" stroke-width="2" filter="url(#cyberGlow)"/>

        <!-- Scan line vodorovná -->
        <line x1="10" y1="80" x2="470" y2="80"
              stroke="#00ffcc" stroke-width="0.5" opacity="0.15" class="scan-anim"/>

        <!-- Trojúhelníkové detaily vpravo -->
        <polygon points="462,60 470,55 470,65" fill="#00ffcc" opacity="0.8"/>
        <polygon points="462,95 470,90 470,100" fill="#ff0080" opacity="0.8"/>

        <!-- Trojúhelníkové detaily vlevo -->
        <polygon points="18,60 10,55 10,65" fill="#ff0080" opacity="0.8"/>
        <polygon points="18,95 10,90 10,100" fill="#00ffcc" opacity="0.8"/>

        <!-- Scatter malé tečky - levý -->
        <circle cx="30" cy="25" r="2.5" fill="#00ffcc" opacity="0.8"/>
        <circle cx="22" cy="32" r="1.5" fill="#00aaff" opacity="0.6"/>
        <circle cx="38" cy="140" r="2" fill="#ff0080" opacity="0.7"/>

        <!-- Scatter malé tečky - pravý -->
        <circle cx="450" cy="135" r="2.5" fill="#ff0080" opacity="0.8"/>
        <circle cx="458" cy="128" r="1.5" fill="#00ffcc" opacity="0.6"/>

        <!-- Trojúhelníky scatter -->
        <polygon points="60,12 66,8 66,16" fill="#00ffcc" opacity="0.6"/>
        <polygon points="80,152 86,148 86,156" fill="#ff00aa" opacity="0.5"/>
        <polygon points="400,8 406,4 406,12" fill="#ff8800" opacity="0.55"/>
        <polygon points="420,154 426,150 426,158" fill="#00aaff" opacity="0.5"/>

        <!-- Text PLAY -->
        <text x="160" y="95"
              font-family="'Inter', system-ui, sans-serif"
              font-size="42" font-weight="800"
              letter-spacing="3"
              text-anchor="middle"
              class="text-rgb">PLAY</text>

        <!-- Text GAME -->
        <text x="320" y="95"
              font-family="'Inter', system-ui, sans-serif"
              font-size="42" font-weight="800"
              letter-spacing="3"
              text-anchor="middle"
              class="text-rgb2">GAME</text>

    </svg>
</button>

</body>
</html>
