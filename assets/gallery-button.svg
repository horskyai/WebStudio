<svg xmlns="http://www.w3.org/2000/svg" width="480" height="220" viewBox="0 0 480 220">
  <defs>
    <!-- Normal state: glassmorphism with silver/grey gradient -->
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f8f8f8" stop-opacity="0.90"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000022"/>
    </filter>
    <!-- Hover state: solid white, stronger shadow -->
    <linearGradient id="solidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#00000035"/>
    </filter>
  </defs>

  <!-- === NORMAL STATE === -->
  <rect x="20" y="10" width="440" height="90" rx="18" ry="18"
        fill="url(#glassGrad)" filter="url(#shadow1)"
        stroke="#dddddd" stroke-width="1"/>
  <text x="240" y="55" font-family="Georgia, 'Times New Roman', serif"
        font-size="30" font-weight="600" letter-spacing="5"
        fill="#3a3a3a" text-anchor="middle" dominant-baseline="middle">GALLERY</text>
  <text x="240" y="82" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" letter-spacing="3" fill="#777777"
        text-anchor="middle" dominant-baseline="middle">DECRE33</text>

  <!-- === HOVER STATE === -->
  <rect x="20" y="118" width="440" height="90" rx="18" ry="18"
        fill="url(#solidGrad)" filter="url(#shadow2)"
        stroke="#e0e0e0" stroke-width="1"/>
  <text x="240" y="158" font-family="Georgia, 'Times New Roman', serif"
        font-size="30" font-weight="600" letter-spacing="5"
        fill="#1a1a1a" text-anchor="middle" dominant-baseline="middle">GALLERY</text>
  <text x="240" y="185" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" letter-spacing="3" fill="#555555"
        text-anchor="middle" dominant-baseline="middle">DECRE33</text>
</svg>
