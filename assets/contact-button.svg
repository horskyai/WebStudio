<svg xmlns="http://www.w3.org/2000/svg" width="480" height="220" viewBox="0 0 480 220">
  <defs>
    <!-- Normal: warm beige -->
    <linearGradient id="beigeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede0cb"/>
      <stop offset="100%" stop-color="#dfd0b8"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="#00000025"/>
    </filter>
    <!-- Hover: white -->
    <linearGradient id="whiteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <filter id="shadow2" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="2" dy="8" stdDeviation="14" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- === NORMAL STATE (beige) === -->
  <rect x="20" y="10" width="440" height="90" rx="30" ry="30"
        fill="url(#beigeGrad)" filter="url(#shadow1)"/>
  <text x="240" y="52" font-family="Georgia, 'Times New Roman', serif"
        font-size="30" font-weight="600" letter-spacing="6"
        fill="#5a5550" text-anchor="middle" dominant-baseline="middle">CONTACT</text>
  <text x="240" y="78" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" letter-spacing="2" fill="#7a7268"
        text-anchor="middle" dominant-baseline="middle">#5ABA1.9</text>

  <!-- === HOVER STATE (white) === -->
  <rect x="20" y="118" width="440" height="90" rx="30" ry="30"
        fill="url(#whiteGrad)" filter="url(#shadow2)"
        stroke="#e5e5e5" stroke-width="1"/>
  <text x="240" y="158" font-family="Georgia, 'Times New Roman', serif"
        font-size="30" font-weight="600" letter-spacing="6"
        fill="#3a3a3a" text-anchor="middle" dominant-baseline="middle">CONTACT</text>
  <text x="240" y="184" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" letter-spacing="2" fill="#666666"
        text-anchor="middle" dominant-baseline="middle">#3ABA19</text>
  <!-- Cursor icon -->
  <g transform="translate(358, 188)" fill="white" stroke="#555" stroke-width="1.2" stroke-linejoin="round">
    <polygon points="0,0 0,18 5,13 9,20 11,19 7,12 14,12"/>
  </g>
</svg>
