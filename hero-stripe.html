<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-01: Stripe Aurora Hero</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-base: #0a0e1a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --color-primary: #635bff;
            --color-secondary: #00d4ff;
            --color-accent: #30cdff;
            --text-main: #ffffff;
            --text-muted: #adbdcc;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body, html { background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-sans); height: 100%; width: 100%; overflow: hidden; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #030712; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transition: clip-path 1.2s cubic-bezier(0.76, 0, 0.24, 1); }
        .loader-center { text-align: center; position: relative; }
        .loader-ring { width: 130px; height: 130px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.02); border-top-color: var(--color-primary); border-bottom-color: var(--color-secondary); animation: spin 1.5s cubic-bezier(0.5,0,0.5,1) infinite; margin-bottom: 2rem; }
        .loader-percentage { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 1.2rem; font-weight: bold; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #hero { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 2rem; }
        .aurora-mesh { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(800px circle at var(--m-x, 50%) var(--m-y, 50%), rgba(99, 91, 255, 0.15) 0%, rgba(0, 212, 255, 0.05) 50%, transparent 100%); z-index: -1; pointer-events: none; }
        .hero-meta { font-family: var(--font-mono); font-size: 0.8rem; color: var(--color-accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1.5rem; opacity: 0; transform: translateY(20px); }
        .title-container { overflow: hidden; margin-bottom: 1.5rem; }
        .hero-title { font-size: 4.5rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1.05; transform: translateY(110%); background: linear-gradient(to bottom, #ffffff 40%, var(--text-muted) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-desc { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; line-height: 1.6; margin-bottom: 3.5rem; opacity: 0; transform: translateY(20px); }
        .cta-btn { background: rgba(99, 91, 255, 0.1); color: #fff; border: 1px solid rgba(99, 91, 255, 0.3); padding: 1rem 2.2rem; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; backdrop-filter: blur(12px); opacity: 0; transform: translateY(20px); transition: background 0.3s, border-color 0.3s; }
        .cta-btn:hover { background: rgba(99, 91, 255, 0.2); border-color: rgba(99, 91, 255, 0.6); }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="loader-center">
            <div class="loader-ring"></div>
            <div class="loader-percentage" id="load-num">0%</div>
        </div>
    </div>
    <main id="hero">
        <div class="aurora-mesh" id="aurora-el"></div>
        <span class="hero-meta" id="meta-el">STRIPE SESSIONS // 2026</span>
        <div class="title-container">
            <h1 class="hero-title" id="title-el">Finanční infrastruktura pro internet.</h1>
        </div>
        <p class="hero-desc" id="desc-el">Miliony firem všech velikostí – od startupů po nadnárodní korporace – používají Stripe k přijímání plateb a správě svého podnikání online.</p>
        <button class="cta-btn" id="btn-el">ZAHÁJIT INTEGRACI ➔</button>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadNum = document.getElementById('load-num');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 8) + 2;
                if (progress >= 100) { progress = 100; clearInterval(interval); revealPage(); }
                loadNum.innerText = progress + '%';
            }, 30);
        });
        function revealPage() {
            document.getElementById('preloader').style.clipPath = 'polygon(0 0, 100% 0, 100% 0, 0 0)';
            const tl = gsap.timeline();
            gsap.set(["#meta-el","#desc-el","#btn-el"], { opacity: 0, y: 20 });
            gsap.set("#title-el", { y: "110%" });
            tl.to("#meta-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" })
              .to("#title-el", { y: 0, duration: 1.2, ease: "power4.out" }, "-=0.6")
              .to("#desc-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, "-=0.8")
              .to("#btn-el", { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, "-=0.6");
        }
        const hero = document.getElementById('hero');
        const aurora = document.getElementById('aurora-el');
        hero.addEventListener('mousemove', (e) => {
            const rect = hero.getBoundingClientRect();
            gsap.to(aurora, {
                style: { '--m-x': `${e.clientX - rect.left}px`, '--m-y': `${e.clientY - rect.top}px` },
                duration: 0.8, ease: "power2.out"
            });
        });
    </script>
</body>
</html>
