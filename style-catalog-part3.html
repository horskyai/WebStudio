<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Stylů - Část 3: H-06 až T-05</title>
    <!-- GSAP pro dokonalé fázování kaskád a interpolací -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* --- DESIGN SYSTEM & THEMES --- */
        :root {
            --bg-base: #040508;
            --bg-card: #0a0d14;
            --border-color: rgba(255, 255, 255, 0.05);
            --color-primary: #10b981; /* Emerald */
            --color-secondary: #06b6d4; /* Cyan */
            --text-main: #f8fafc;
            --text-muted: #475569;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-mono: 'Fira Code', monospace;
        }

        /* Motiv: Editorial Noir (High-contrast minimalist) */
        .theme-noir {
            --bg-base: #000000;
            --bg-card: #0a0a0a;
            --border-color: rgba(255, 255, 255, 0.08);
            --color-primary: #ffffff;
            --color-secondary: #888888;
            --text-main: #ffffff;
            --text-muted: #555555;
        }

        /* Motiv: Bento Tech (Modulární tmavé rozhraní) */
        .theme-bento {
            --bg-base: #04060a;
            --bg-card: #0b0f17;
            --border-color: rgba(99, 102, 241, 0.1);
            --color-primary: #6366f1;
            --color-secondary: #ec4899;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100%; width: 100%;
            overflow: hidden;
            transition: background-color 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- DASHBOARD CONTROL --- */
        .dashboard-nav {
            position: fixed;
            top: 2rem; left: 50%;
            transform: translateX(-50%);
            background: rgba(4, 6, 10, 0.6);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            padding: 0.5rem;
            border-radius: 30px;
            display: flex; gap: 0.5rem;
            z-index: 10000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: border-color 0.5s ease;
        }

        .nav-btn {
            background: transparent; border: none;
            color: var(--text-muted);
            padding: 0.6rem 1.2rem;
            font-size: 0.8rem; font-weight: 600;
            font-family: var(--font-mono);
            border-radius: 20px; cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--color-primary);
            color: #fff;
        }


        /* ==========================================================
           L-09: CYBER DECRYPT PRELOADER
           ========================================================== */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000000;
            z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            transition: clip-path 1.2s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .loader-center {
            text-align: center;
        }

        .decrypt-box {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--color-primary);
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .loader-bar-bg {
            width: 200px; height: 1px;
            background: rgba(255,255,255,0.05);
            position: relative; overflow: hidden;
            margin: 0 auto;
        }

        .loader-bar-fill {
            position: absolute; top: 0; left: 0;
            width: 0; height: 100%;
            background: var(--color-primary);
        }


        /* ==========================================================
           T-05: CIRCULAR EXPANDER TRANSITION (Kruhová clona z kurzoru)
           ========================================================== */
        #transition-circle {
            position: fixed;
            width: 10px; height: 10px;
            background-color: var(--color-primary);
            border-radius: 50%;
            z-index: 9998;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
        }


        /* ==========================================================
           HERO PLOCHA (H-06 a H-07)
           ========================================================== */
        #hero-viewport {
            position: relative;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            z-index: 1;
        }

        /* H-06: Editorial Noir (Maska světlometu sledující myš) */
        .noir-lens-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050505;
            z-index: -1;
            display: none;
        }

        .noir-reveal-text {
            font-family: var(--font-serif);
            font-size: 5rem; font-style: italic; font-weight: 300;
            color: rgba(255,255,255,0.02);
            position: relative; cursor: crosshair;
            user-select: none;
        }

        .noir-reveal-text::after {
            content: 'NOIR CONTEXT';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            color: #fff;
            clip-path: circle(40px at var(--lx, 0px) var(--ly, 0px));
            transition: clip-path 0.1s ease;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* H-07: Bento Tech Hub (Asymetrický Grid) */
        .bento-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            padding: 0 2rem;
        }

        .bento-grid {
            width: 100%;
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 120px; gap: 1rem;
        }

        .bento-cell {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex; flex-direction: column; justify-content: space-between;
            text-align: left; opacity: 0;
            transform: translateY(20px);
        }

        .bc-large { grid-column: span 2; grid-row: span 2; }
        .bc-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
        .bc-desc { font-size: 0.85rem; color: var(--text-muted); }

        /* STANDARDNÍ HERO ELEMENTY PRO BENTO MOTIV */
        .hero-info-wrap {
            margin-bottom: 3rem;
            text-align: center;
        }

        .hero-tag {
            font-family: var(--font-mono);
            font-size: 0.8rem; color: var(--color-primary);
            letter-spacing: 0.35em; text-transform: uppercase;
            margin-bottom: 1rem; display: block;
            opacity: 0; transform: translateY(15px);
        }

        .title-mask {
            overflow: hidden; margin-bottom: 1rem;
        }

        .hero-title {
            font-size: 3rem; font-weight: 850;
            letter-spacing: -0.04em; line-height: 1.1;
            transform: translateY(110%);
        }

    </style>
</head>
<body class="theme-noir">

    <!-- STYLE SWITCHER PANEL -->
    <div class="dashboard-nav" id="dash-nav">
        <button class="nav-btn active" onclick="switchTheme('noir')">H-06: EDITORIAL NOIR</button>
        <button class="nav-btn" onclick="switchTheme('bento')">H-07: BENTO TECH</button>
    </div>

    <!-- T-05: CIRCULAR RIPPLE EXPANDER -->
    <div id="transition-circle"></div>

    <!-- L-09: CYBER DECRYPT PRELOADER -->
    <div id="preloader">
        <div class="loader-center">
            <div class="decrypt-box" id="decrypt-val">000000</div>
            <div class="loader-bar-bg">
                <div class="loader-bar-fill" id="loader-fill-el"></div>
            </div>
        </div>
    </div>

    <!-- MAIN INTERACTIVE SHOWCASE -->
    <main id="hero-viewport">
        <!-- Pozadí na základě motivu -->
        <div class="noir-lens-bg" id="noir-bg-el">
            <div class="noir-reveal-text" id="noir-text-el" data-text="NOIR CONTEXT">NOIR CONTEXT</div>
        </div>

        <div class="bento-wrapper" id="bento-grid-el">
            <div class="hero-info-wrap">
                <span class="hero-tag" id="tag-el">BENTO MODULE INTEGRATION</span>
                <div class="title-mask">
                    <h1 class="hero-title" id="title-el">Asymetrický systém.</h1>
                </div>
            </div>
            <div class="bento-grid">
            <!-- Bento buňky -->
            <div class="bento-cell bc-large">
                <div>
                    <h3 class="bc-title">Datový tok</h3>
                    <p class="bc-desc">Realtime vizualizace serverových požadavků přenášených přes asynchronní sockety.</p>
                </div>
            </div>
            <div class="bento-cell">
                <div>
                    <h3 class="bc-title">Uzel 01</h3>
                    <p class="bc-desc">Aktivní stav.</p>
                </div>
            </div>
            <div class="bento-cell">
                <div>
                    <h3 class="bc-title">Uzel 02</h3>
                    <p class="bc-desc">Zabezpečeno.</p>
                </div>
            </div>
            </div><!-- /bento-grid -->
        </div><!-- /bento-wrapper -->
    </main>

    <!-- --- SCRIPTS & STAGING CONTROL --- -->
    <script>
        let activeTheme = 'noir';
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;

        document.addEventListener('DOMContentLoaded', () => {
            // Inicializace výchozího stavu (Noir)
            document.getElementById('noir-bg-el').style.display = 'flex';

            // Sledování souřadnic myši pro T-05 přechod
            document.addEventListener('mousemove', (e) => {
                cursorX = e.clientX;
                cursorY = e.clientY;
            });

            runPreloader();
        });

        // --- L-09: CYBER DECRYPT PRELOADER ---
        function runPreloader() {
            const decryptVal = document.getElementById('decrypt-val');
            const loaderFill = document.getElementById('loader-fill-el');
            const targetWord = "SYSTEM";
            const chars = "10XYZ#@$%&*";
            let progress = 0;

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 1;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    revealPage(); // Dokončení načítání
                }

                // Aktualizace délky načítací lišty
                loaderFill.style.width = progress + '%';

                // Výpočet dešifrovacího stavu slova
                const iterations = (progress / 100) * targetWord.length;
                decryptVal.innerText = targetWord.split("").map((char, index) => {
                    if (index < iterations) return targetWord[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");

            }, 40);
        }

        function revealPage() {
            const preloader = document.getElementById('preloader');
            // Výjezd preloaderu nahoru přes clip-path
            preloader.style.clipPath = 'polygon(0 0, 100% 0, 100% 0, 0 0)';
            animateHero();
        }

        // --- GSAP STAGING TIMELINE ---
        function animateHero() {
            const tl = gsap.timeline();

            if (activeTheme === 'bento') {
                gsap.set("#tag-el", { opacity: 0, y: 15 });
                gsap.set("#title-el", { y: "110%" });
                gsap.set(".bento-cell", { opacity: 0, y: 20 });

                tl.to("#tag-el", { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" })
                  .to("#title-el", { y: 0, duration: 1.0, ease: "power4.out" }, "-=0.4")
                  .to(".bento-cell", {
                      opacity: 1,
                      y: 0,
                      duration: 0.8,
                      ease: "power3.out",
                      stagger: 0.1 // Časový odstup rozbalení buněk bento gridu
                  }, "-=0.6");
            }
        }

        // --- T-05: CIRCULAR RIPPLE EXPANDER TRANSITION ---
        function switchTheme(themeName) {
            if (themeName === activeTheme) return;

            const circle = document.getElementById('transition-circle');
            const btns = document.querySelectorAll('.nav-btn');

            btns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(themeName)) {
                    btn.classList.add('active');
                }
            });

            // Pozicování startovního bodu kruhu na souřadnice kurzoru
            gsap.set(circle, { left: cursorX, top: cursorY, scale: 0 });

            // Výpočet maximálního měřítka pro bezpečné zakrytí celé obrazovky (fyzika úhlopříčky)
            const maxScale = Math.max(window.innerWidth, window.innerHeight) * 0.25;

            // Spuštění kruhového přechodu (Ripple expander)
            gsap.timeline()
                .to(circle, {
                    scale: maxScale,
                    duration: 0.8,
                    ease: "power3.inOut"
                })
                .call(() => {
                    // Bod zakrytí obrazovky - změna motivu
                    applyThemeChanges(themeName);
                })
                .to(circle, {
                    scale: 0,
                    duration: 0.8,
                    ease: "power3.inOut",
                    delay: 0.1
                });
        }

        function applyThemeChanges(theme) {
            const body = document.body;
            const noirBg = document.getElementById('noir-bg-el');
            const bentoGrid = document.getElementById('bento-grid-el');
            const nav = document.getElementById('dash-nav');

            noirBg.style.display = 'none';
            bentoGrid.style.display = 'none';
            body.className = '';

            if (theme === 'noir') {
                body.className = 'theme-noir';
                noirBg.style.display = 'flex';
                nav.style.borderColor = 'rgba(255, 255, 255, 0.08)';

            } else if (theme === 'bento') {
                body.className = 'theme-bento';
                bentoGrid.style.display = 'flex';
                nav.style.borderColor = 'rgba(99, 102, 241, 0.1)';
            }

            activeTheme = theme;
            animateHero();
        }

        // --- H-06: EDITORIAL NOIR (SPOTLIGHT LENS) ---
        const noirBg = document.getElementById('noir-bg-el');
        const noirText = document.getElementById('noir-text-el');

        if (noirBg && noirText) {
            noirBg.addEventListener('mousemove', (e) => {
                if (activeTheme !== 'noir') return;

                const rect = noirText.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Nastavení pozice masky přímo na souřadnice myši uvnitř elementu
                noirText.style.setProperty('--lx', `${x}px`);
                noirText.style.setProperty('--ly', `${y}px`);
            });
        }
    </script>
</body>
</html>
