<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Cinematic Reveal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@200&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent: #8e7d5e; /* Muted Bronze */
            --text-color: #ffffff;
            --ease-cinema: cubic-bezier(0.2, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* 1. Cinematic Texture & Grain */
        .film-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* 2. Anamorphic Letterbox Bars */
        .letterbox {
            position: fixed;
            left: 0; width: 100%; height: 12vh;
            background: #000;
            z-index: 5;
            animation: barReveal 2.5s var(--ease-cinema) forwards;
        }
        .top-bar { top: 0; transform: translateY(-100%); }
        .bottom-bar { bottom: 0; transform: translateY(100%); }

        @keyframes barReveal {
            to { transform: translateY(0); }
        }

        /* 3. Main Stage with Dolly-Out Movement */
        .stage {
            text-align: center;
            z-index: 2;
            animation: dollyOut 15s var(--ease-cinema) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Abstract Shutter Icon SVG */
        .shutter-svg {
            width: 60px;
            height: 60px;
            margin-bottom: 40px;
            opacity: 0.6;
        }

        .shutter-path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 1;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawPath 3s var(--ease-cinema) forwards 0.5s;
        }

        /* 4. Typography Reveal with Motion Blur */
        .content-box {
            overflow: visible;
            perspective: 1000px;
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            color: var(--text-color);
            filter: blur(10px);
            opacity: 0;
            animation: textReveal 4s var(--ease-cinema) forwards 1s;
        }

        .brand-name span {
            font-style: italic;
            color: var(--accent);
        }

        .role-tag {
            font-size: 0.7rem;
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 3s ease forwards 2.5s;
        }

        /* Keyframes */
        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        @keyframes textReveal {
            0% { filter: blur(12px); opacity: 0; transform: scale(1.1); letter-spacing: 0.2rem; }
            40% { filter: blur(5px); opacity: 0.6; }
            100% { filter: blur(0px); opacity: 1; transform: scale(1); letter-spacing: 1.2rem; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes dollyOut {
            from { transform: scale(1.05); }
            to { transform: scale(0.95); }
        }

        /* Ambient Light Pulse */
        .light-bloom {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(142, 125, 94, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            animation: bloomMove 10s ease-in-out infinite;
        }

        @keyframes bloomMove {
            0%, 100% { transform: translate(-10%, -10%); }
            50% { transform: translate(10%, 10%); }
        }

        @media (max-width: 768px) {
            .brand-name { font-size: 1.8rem; }
            .role-tag { font-size: 0.5rem; letter-spacing: 0.4rem; }
            .letterbox { height: 8vh; }
        }
    </style>
</head>
<body>

    <div class="film-texture"></div>
    <div class="light-bloom"></div>

    <!-- Letterbox Bars -->
    <div class="letterbox top-bar"></div>
    <div class="letterbox bottom-bar"></div>

    <div class="stage">
        <!-- Abstract Focus/Shutter Icon -->
        <svg class="shutter-svg" viewBox="0 0 100 100">
            <circle class="shutter-path" cx="50" cy="50" r="45" />
            <path class="shutter-path" d="M50 5 L50 20 M50 80 L50 95 M5 50 L20 50 M80 50 L95 50" style="animation-delay: 0.8s;" />
            <circle cx="50" cy="50" r="1.5" fill="var(--accent)" opacity="0">
                <animate attributeName="opacity" from="0" to="1" dur="1s" begin="2.5s" fill="freeze" />
            </circle>
        </svg>

        <div class="content-box">
            <h1 class="brand-name">Julian <span>Vanhoutte</span></h1>
        </div>

        <p class="role-tag">Cinematography & Creative Direction</p>
    </div>

</body>
</html>
