<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX & ETHER | Visual Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@100&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --text-pure: #ffffff;
            --accent-soft: rgba(255, 255, 255, 0.1);
            --shimmer: rgba(255, 255, 255, 0.6);
            --ease-cinematic: cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-pure);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        /* Cinematic Grain & Vignette */
        .overlay-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* Abstract Composition */
        .visual-stage {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        /* Morphing Liquid Shape */
        .liquid-container {
            position: relative;
            width: 300px;
            height: 300px;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.05));
        }

        .morph-shape {
            fill: var(--accent-soft);
            stroke: var(--shimmer);
            stroke-width: 0.5;
            animation: morph 12s var(--ease-cinematic) infinite alternate;
        }

        /* Kinetic Rings */
        .kinetic-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: rotateRing 20s linear infinite;
        }

        .ring-1 { width: 400px; height: 400px; border-style: dashed; animation-duration: 40s; }
        .ring-2 { width: 350px; height: 350px; opacity: 0.5; animation-direction: reverse; }

        /* Typography Reveal */
        .reveal-box {
            margin-top: -20px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 3s var(--ease-cinematic) forwards 1s;
        }

        .subline {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.2rem;
            color: rgba(255,255,255,0.3);
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 4s ease forwards 2.5s;
        }

        /* Keyframes */
        @keyframes morph {
            0% { d: path("M210,150Q210,210,150,210Q90,210,90,150Q90,90,150,90Q210,90,210,150Z"); }
            33% { d: path("M230,150Q210,230,150,230Q70,230,90,150Q110,70,150,90Q190,110,230,150Z"); }
            66% { d: path("M190,150Q210,190,150,230Q90,270,110,150Q130,30,150,70Q170,110,190,150Z"); }
            100% { d: path("M210,150Q210,210,150,210Q90,210,90,150Q90,90,150,90Q210,90,210,150Z"); }
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: 0.7rem;
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .liquid-container { width: 200px; height: 200px; }
            .ring-1 { width: 280px; height: 280px; }
            .ring-2 { width: 240px; height: 240px; }
            .brand-name { font-size: 1.8rem; letter-spacing: 0.3rem; }
        }
    </style>
</head>
<body>

    <div class="overlay-texture"></div>
    <div class="vignette"></div>

    <!-- Kinetic Elements -->
    <div class="kinetic-ring ring-1"></div>
    <div class="kinetic-ring ring-2"></div>

    <div class="visual-stage">
        <div class="liquid-container">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <!-- Liquid Blob Path -->
                <path class="morph-shape" d="M210,150Q210,210,150,210Q90,210,90,150Q90,90,150,90Q210,90,210,150Z" />
            </svg>
        </div>

        <div class="reveal-box">
            <h1 class="brand-name">Onyx & Ether</h1>
            <p class="subline">Studio de Création</p>
        </div>
    </div>

</body>
</html>
