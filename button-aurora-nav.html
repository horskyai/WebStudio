<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-11: Aurora Nav Bar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1018;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .nav-scene {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Aurora blob za buttonem */
        .aurora-blob {
            position: absolute;
            width: 500px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(ellipse at 35% 45%,
                rgba(120, 180, 255, 0.55) 0%,
                rgba(160, 120, 255, 0.45) 35%,
                rgba(200, 160, 255, 0.25) 55%,
                rgba(255, 255, 255, 0.08) 70%,
                transparent 85%
            );
            filter: blur(28px);
            pointer-events: none;
        }

        .nav-btn {
            position: relative;
            z-index: 1;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.3s ease;
        }
        .nav-btn:hover { transform: scale(1.03); }
        .nav-btn:active { transform: scale(0.98); }

        .nav-item {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .nav-item:hover text { opacity: 1 !important; }
    </style>
</head>
<body>

<div class="nav-scene">
    <div class="aurora-blob"></div>

    <button class="nav-btn">
        <svg width="520" height="100" viewBox="0 0 520 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Glassmorphic fill -->
                <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
                    <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
                </linearGradient>

                <!-- Horní lesk -->
                <linearGradient id="glassShine" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stop-color="rgba(255,255,255,0.4)"/>
                    <stop offset="40%"  stop-color="rgba(255,255,255,0.1)"/>
                    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                </linearGradient>

                <!-- Okraj - bílý glassmorphic -->
                <linearGradient id="glassRim" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"   stop-color="rgba(255,255,255,0.7)"/>
                    <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
                </linearGradient>

                <!-- Blur pro shadow -->
                <filter id="navShadow" x="-5%" y="-20%" width="110%" height="140%">
                    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(100,120,255,0.3)"/>
                </filter>

                <clipPath id="navClip">
                    <rect x="3" y="3" width="514" height="94" rx="40"/>
                </clipPath>
            </defs>

            <!-- Shadow vrstva -->
            <rect x="3" y="3" width="514" height="94" rx="40"
                  fill="rgba(80,100,200,0.15)" filter="url(#navShadow)"/>

            <!-- Hlavní glassmorphic tělo -->
            <rect x="3" y="3" width="514" height="94" rx="40"
                  fill="url(#glassFill)"/>

            <!-- Horní lesk (top half) -->
            <rect x="3" y="3" width="514" height="47" rx="40"
                  fill="url(#glassShine)" clip-path="url(#navClip)"/>

            <!-- Okraj -->
            <rect x="3" y="3" width="514" height="94" rx="40"
                  fill="none" stroke="url(#glassRim)" stroke-width="1.5"/>

            <!-- Nav položky -->
            <!-- HOME -->
            <text x="120" y="56"
                  font-family="'Inter', system-ui, sans-serif"
                  font-size="20" font-weight="600"
                  letter-spacing="3"
                  text-anchor="middle"
                  fill="rgba(255,255,255,0.95)">HOME</text>

            <!-- Oddělovač -->
            <line x1="210" y1="35" x2="210" y2="65"
                  stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

            <!-- ABOUT -->
            <text x="260" y="56"
                  font-family="'Inter', system-ui, sans-serif"
                  font-size="20" font-weight="600"
                  letter-spacing="3"
                  text-anchor="middle"
                  fill="rgba(255,255,255,0.95)">ABOUT</text>

            <!-- Oddělovač -->
            <line x1="310" y1="35" x2="310" y2="65"
                  stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

            <!-- CONTACT -->
            <text x="400" y="56"
                  font-family="'Inter', system-ui, sans-serif"
                  font-size="20" font-weight="600"
                  letter-spacing="3"
                  text-anchor="middle"
                  fill="rgba(255,255,255,0.95)">CONTACT</text>
        </svg>
    </button>
</div>

</body>
</html>
