<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-15: Holographic Connect Button</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0d1a;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .btn-holo {
            position: relative;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        .btn-holo:hover {
            transform: scale(1.04);
            filter: brightness(1.15) saturate(1.3);
        }
        .btn-holo:active { transform: scale(0.97); }

        @keyframes holoShift {
            0%   { stop-color: rgba(100,220,255,0.9); }
            25%  { stop-color: rgba(180,100,255,0.9); }
            50%  { stop-color: rgba(255,150,100,0.85); }
            75%  { stop-color: rgba(100,255,180,0.9); }
            100% { stop-color: rgba(100,220,255,0.9); }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.8; r: 2.5; }
            50% { opacity: 0.3; r: 3.5; }
        }
        @keyframes dotPulse2 {
            0%, 100% { opacity: 0.5; r: 2; }
            50% { opacity: 1; r: 3; }
        }
        @keyframes lineFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.2; }
        }

        .dp1 { animation: dotPulse 2.5s ease infinite; }
        .dp2 { animation: dotPulse2 3s ease infinite 0.8s; }
        .dp3 { animation: dotPulse 2s ease infinite 1.5s; }
        .lf1 { animation: lineFade 3s ease infinite; }
        .lf2 { animation: lineFade 3s ease infinite 1s; }
        .lf3 { animation: lineFade 2.5s ease infinite 0.5s; }
    </style>
</head>
<body>

<button class="btn-holo">
    <svg width="500" height="200" viewBox="0 0 500 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Holografický fill - rainbow mesh -->
            <linearGradient id="holoFill1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"   stop-color="rgba(80,200,255,0.85)"/>
                <stop offset="25%"  stop-color="rgba(120,80,255,0.75)"/>
                <stop offset="50%"  stop-color="rgba(255,120,80,0.7)"/>
                <stop offset="75%"  stop-color="rgba(80,255,160,0.75)"/>
                <stop offset="100%" stop-color="rgba(80,200,255,0.85)"/>
            </linearGradient>

            <linearGradient id="holoFill2" x1="1" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(255,180,80,0.5)"/>
                <stop offset="50%"  stop-color="rgba(80,160,255,0.4)"/>
                <stop offset="100%" stop-color="rgba(200,80,255,0.45)"/>
            </linearGradient>

            <!-- Glassmorphic overlay -->
            <linearGradient id="holoGlass" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.25)"/>
                <stop offset="50%"  stop-color="rgba(255,255,255,0.05)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
            </linearGradient>

            <!-- Shine diagonální -->
            <linearGradient id="holoShine" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.4)"/>
                <stop offset="35%"  stop-color="rgba(255,255,255,0.08)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>

            <!-- Text gradient holo -->
            <linearGradient id="holoText" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#c0e8ff"/>
                <stop offset="40%"  stop-color="#e0b0ff"/>
                <stop offset="70%"  stop-color="#ffb0c0"/>
                <stop offset="100%" stop-color="#b0ffe0"/>
            </linearGradient>

            <!-- Border gradient -->
            <linearGradient id="holoBorder" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"   stop-color="rgba(200,240,255,0.9)"/>
                <stop offset="50%"  stop-color="rgba(180,180,255,0.6)"/>
                <stop offset="100%" stop-color="rgba(200,240,255,0.8)"/>
            </linearGradient>

            <!-- Glow filter -->
            <filter id="holoGlow" x="-8%" y="-15%" width="116%" height="130%">
                <feGaussianBlur stdDeviation="6" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>

            <!-- Circuit lines na pozadí -->
            <filter id="circLine" x="-5%" y="-10%" width="110%" height="120%">
                <feGaussianBlur stdDeviation="1"/>
            </filter>

            <clipPath id="holoClip">
                <rect x="10" y="50" width="480" height="100" rx="30"/>
            </clipPath>
        </defs>

        <!-- HUD circuit lines na pozadí (dekorativní) -->
        <!-- Horní linka -->
        <path d="M 100 40 L 180 40 L 200 25 L 300 25 L 320 40 L 400 40"
              stroke="rgba(100,180,255,0.4)" stroke-width="1" fill="none" class="lf1" filter="url(#circLine)"/>
        <!-- Dolní linka -->
        <path d="M 100 160 L 180 160 L 200 175 L 300 175 L 320 160 L 400 160"
              stroke="rgba(150,100,255,0.4)" stroke-width="1" fill="none" class="lf2" filter="url(#circLine)"/>
        <!-- Levá linka -->
        <path d="M 50 70 L 30 70 L 20 80 L 20 120 L 30 130 L 50 130"
              stroke="rgba(100,220,200,0.35)" stroke-width="1" fill="none" class="lf3" filter="url(#circLine)"/>
        <!-- Pravá linka -->
        <path d="M 450 70 L 470 70 L 480 80 L 480 120 L 470 130 L 450 130"
              stroke="rgba(100,220,200,0.35)" stroke-width="1" fill="none" class="lf1" filter="url(#circLine)"/>

        <!-- Tečkované body na linkách -->
        <circle cx="200" cy="25" r="2.5" fill="rgba(100,220,255,0.8)" class="dp1"/>
        <circle cx="300" cy="25" r="2.5" fill="rgba(200,100,255,0.8)" class="dp2"/>
        <circle cx="200" cy="175" r="2.5" fill="rgba(100,255,180,0.8)" class="dp3"/>
        <circle cx="300" cy="175" r="2.5" fill="rgba(100,200,255,0.8)" class="dp1"/>
        <circle cx="140" cy="40" r="2" fill="rgba(180,120,255,0.7)" class="dp2"/>
        <circle cx="360" cy="40" r="2" fill="rgba(80,220,200,0.7)" class="dp3"/>
        <circle cx="140" cy="160" r="2" fill="rgba(80,220,200,0.7)" class="dp1"/>
        <circle cx="360" cy="160" r="2" fill="rgba(180,100,255,0.7)" class="dp2"/>

        <!-- Malé scatter tečky -->
        <circle cx="65" cy="80" r="1.5" fill="rgba(100,220,255,0.6)" class="dp3"/>
        <circle cx="65" cy="120" r="1.5" fill="rgba(200,100,255,0.6)" class="dp1"/>
        <circle cx="435" cy="80" r="1.5" fill="rgba(100,255,180,0.6)" class="dp2"/>
        <circle cx="435" cy="120" r="1.5" fill="rgba(100,200,255,0.6)" class="dp3"/>

        <!-- Hlavní holografický fill -->
        <rect x="10" y="50" width="480" height="100" rx="30"
              fill="url(#holoFill1)"/>

        <!-- Druhá vrstva holo -->
        <rect x="10" y="50" width="480" height="100" rx="30"
              fill="url(#holoFill2)"/>

        <!-- Glassmorphic overlay -->
        <rect x="10" y="50" width="480" height="100" rx="30"
              fill="url(#holoGlass)"/>

        <!-- Diagonální shine -->
        <rect x="10" y="50" width="480" height="100" rx="30"
              fill="url(#holoShine)" clip-path="url(#holoClip)"/>

        <!-- Outer border bílý -->
        <rect x="10" y="50" width="480" height="100" rx="30"
              fill="none" stroke="url(#holoBorder)" stroke-width="1.5"
              filter="url(#holoGlow)"/>

        <!-- Inner border jemný -->
        <rect x="15" y="55" width="470" height="90" rx="27"
              fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

        <!-- Text CONNECT WALLET -->
        <text x="250" y="111"
              font-family="'Inter', system-ui, sans-serif"
              font-size="28" font-weight="700"
              letter-spacing="4"
              text-anchor="middle"
              fill="url(#holoText)">CONNECT WALLET</text>

        <!-- Text highlight -->
        <text x="250" y="111"
              font-family="'Inter', system-ui, sans-serif"
              font-size="28" font-weight="700"
              letter-spacing="4"
              text-anchor="middle"
              fill="rgba(255,255,255,0.2)">CONNECT WALLET</text>
    </svg>
</button>

</body>
</html>
