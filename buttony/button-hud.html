<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-09: HUD Tech Button</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 40% 50%, #1a2235 0%, #0d1520 50%, #080c14 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }

        .btn-hud {
            position: relative;
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: filter 0.3s ease, transform 0.2s ease;
        }
        .btn-hud:hover {
            filter: brightness(1.25) drop-shadow(0 0 12px rgba(0,220,255,0.4));
            transform: scale(1.03);
        }
        .btn-hud:active { transform: scale(0.97); }

        /* Blikající animace pro tečky */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .dot-blink { animation: blink 2s ease infinite; }
        .dot-blink-2 { animation: blink 2s ease infinite 0.5s; }
        .dot-blink-3 { animation: blink 2s ease infinite 1s; }

        /* Scan line efekt */
        @keyframes scan {
            0% { opacity: 0.6; }
            50% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }
        .scan-line { animation: scan 3s ease infinite; }
    </style>
</head>
<body>

<button class="btn-hud">
<svg width="480" height="160" viewBox="0 0 480 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Cyan glow filter -->
        <filter id="cyanGlow" x="-20%" y="-40%" width="140%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Orange glow filter -->
        <filter id="orangeGlow" x="-20%" y="-40%" width="140%" height="180%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Soft inner glow -->
        <filter id="softGlow" x="-5%" y="-10%" width="110%" height="120%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Text glow -->
        <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Gradient fill tmavého pozadí -->
        <linearGradient id="bgGrad" x1="0" y1="0" x2="480" y2="160" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#141c28"/>
            <stop offset="100%" stop-color="#0e1520"/>
        </linearGradient>
    </defs>

    <!-- === HLAVNÍ TĚLO BUTTONU === -->
    <!-- Tmavé pozadí se zkoseným levým rohem -->
    <path d="M 38 18 L 442 18 L 462 38 L 462 122 L 442 142 L 38 142 L 18 122 L 18 38 Z"
          fill="url(#bgGrad)" opacity="0.95"/>

    <!-- === ORANŽOVÉ AKCENTY (rohy a čáry) === -->

    <!-- Levý horní oranžový roh - lomená čára -->
    <path d="M 18 70 L 18 38 L 38 18 L 80 18"
          stroke="#ff7730" stroke-width="2" fill="none" filter="url(#orangeGlow)"/>
    <!-- Levý horní - malý roh detail -->
    <path d="M 28 28 L 45 18"
          stroke="#ff7730" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Pravý dolní oranžový roh -->
    <path d="M 462 90 L 462 122 L 442 142 L 400 142"
          stroke="#ff7730" stroke-width="2" fill="none" filter="url(#orangeGlow)"/>
    <!-- Pravý dolní - malý roh detail -->
    <path d="M 452 132 L 435 142"
          stroke="#ff7730" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Horní oranžová šrafovaná čára (vlevo) -->
    <line x1="90" y1="18" x2="160" y2="18" stroke="#ff7730" stroke-width="1.5" opacity="0.5" class="scan-line"/>
    <!-- Šrafování - krátké svislé čárky -->
    <line x1="95" y1="14" x2="95" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="101" y1="14" x2="101" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="107" y1="14" x2="107" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="113" y1="14" x2="113" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="119" y1="14" x2="119" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="125" y1="14" x2="125" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="131" y1="14" x2="131" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="137" y1="14" x2="137" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="143" y1="14" x2="143" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="149" y1="14" x2="149" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="155" y1="14" x2="155" y2="22" stroke="#ff7730" stroke-width="1" opacity="0.4"/>

    <!-- Spodní oranžová šrafovaná čára (vpravo) -->
    <line x1="320" y1="142" x2="390" y2="142" stroke="#ff7730" stroke-width="1.5" opacity="0.5" class="scan-line"/>
    <line x1="325" y1="138" x2="325" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="331" y1="138" x2="331" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="337" y1="138" x2="337" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="343" y1="138" x2="343" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="349" y1="138" x2="349" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="355" y1="138" x2="355" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="361" y1="138" x2="361" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="367" y1="138" x2="367" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="373" y1="138" x2="373" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="379" y1="138" x2="379" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>
    <line x1="385" y1="138" x2="385" y2="146" stroke="#ff7730" stroke-width="1" opacity="0.4"/>

    <!-- === CYAN BORDER A DETAILY === -->

    <!-- Hlavní cyan border (celý obrys) -->
    <path d="M 38 18 L 442 18 L 462 38 L 462 122 L 442 142 L 38 142 L 18 122 L 18 38 Z"
          stroke="#00ccff" stroke-width="1.5" fill="none" filter="url(#softGlow)" opacity="0.7"/>

    <!-- Pravý horní cyan roh (detail bracket) -->
    <path d="M 390 18 L 462 18 L 462 70"
          stroke="#00ccff" stroke-width="2.5" fill="none" filter="url(#cyanGlow)"/>
    <!-- Malý pravý horní bracket detail -->
    <line x1="450" y1="18" x2="462" y2="30" stroke="#00ccff" stroke-width="1" opacity="0.5"/>

    <!-- Levý dolní cyan bracket -->
    <path d="M 18 90 L 18 142 L 90 142"
          stroke="#00ccff" stroke-width="2.5" fill="none" filter="url(#cyanGlow)"/>

    <!-- Pravý horní - šipky >>>> -->
    <text x="384" y="36"
          font-family="monospace" font-size="11" font-weight="bold"
          fill="#00ccff" opacity="0.8" letter-spacing="1">››››</text>

    <!-- Levý dolní - šipky <<<< -->
    <text x="52" y="130"
          font-family="monospace" font-size="11" font-weight="bold"
          fill="#00ccff" opacity="0.8" letter-spacing="1">‹‹‹‹</text>

    <!-- Horní cyan čára (pravá strana) -->
    <line x1="200" y1="18" x2="340" y2="18" stroke="#00ccff" stroke-width="1" opacity="0.4" class="scan-line"/>

    <!-- Spodní cyan čára (levá strana) -->
    <line x1="140" y1="142" x2="300" y2="142" stroke="#00ccff" stroke-width="1" opacity="0.4" class="scan-line"/>

    <!-- === TEČKY / BODY === -->

    <!-- Levý horní roh tečka (oranžová) -->
    <circle cx="22" cy="66" r="3" fill="#ff7730" filter="url(#orangeGlow)" class="dot-blink"/>
    <!-- Pravý horní tečka (oranžová) -->
    <circle cx="458" cy="42" r="2.5" fill="#ff7730" filter="url(#orangeGlow)" class="dot-blink-2"/>
    <!-- Pravý dolní tečka (oranžová) -->
    <circle cx="458" cy="118" r="3" fill="#ff7730" filter="url(#orangeGlow)" class="dot-blink-3"/>
    <!-- Spodní střed tečka (oranžová) -->
    <circle cx="240" cy="155" r="2.5" fill="#ff7730" filter="url(#orangeGlow)" class="dot-blink"/>

    <!-- Horní tečky (cyan) -->
    <circle cx="178" cy="18" r="2" fill="#00ccff" filter="url(#cyanGlow)" class="dot-blink-2"/>
    <!-- Levý dolní tečka (cyan) -->
    <circle cx="22" cy="94" r="2" fill="#00ccff" filter="url(#cyanGlow)" class="dot-blink"/>

    <!-- Rohové tečky dekorativní (malé) -->
    <circle cx="170" cy="18" r="1" fill="#00ccff" opacity="0.5"/>
    <circle cx="310" cy="142" r="1" fill="#00ccff" opacity="0.5"/>
    <circle cx="240" cy="18" r="1" fill="#ff7730" opacity="0.4"/>

    <!-- Scatter tečky v rohu nahoře vlevo -->
    <circle cx="60" cy="30" r="1" fill="#00ccff" opacity="0.4" class="dot-blink"/>
    <circle cx="68" cy="24" r="0.8" fill="#00ccff" opacity="0.3" class="dot-blink-2"/>
    <circle cx="55" cy="40" r="0.8" fill="#00ccff" opacity="0.3" class="dot-blink-3"/>

    <!-- Scatter tečky vpravo dole -->
    <circle cx="420" cy="130" r="1" fill="#00ccff" opacity="0.4" class="dot-blink-2"/>
    <circle cx="430" cy="136" r="0.8" fill="#00ccff" opacity="0.3" class="dot-blink"/>
    <circle cx="412" cy="126" r="0.8" fill="#00ccff" opacity="0.3" class="dot-blink-3"/>

    <!-- === HLAVNÍ TEXT === -->
    <!-- Glow shadow layer -->
    <text x="240" y="97"
          font-family="'Inter', system-ui, sans-serif"
          font-size="38" font-weight="700"
          letter-spacing="8"
          text-anchor="middle"
          fill="#00ccff"
          filter="url(#textGlow)"
          opacity="0.6">ABOUT</text>

    <!-- Hlavní text -->
    <text x="240" y="97"
          font-family="'Inter', system-ui, sans-serif"
          font-size="38" font-weight="700"
          letter-spacing="8"
          text-anchor="middle"
          fill="#00ddff">ABOUT</text>

</svg>
</button>

</body>
</html>
