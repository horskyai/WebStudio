<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-12: Liquid Blob Button</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #12102a;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .btn-liquid {
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.3s ease;
        }
        .btn-liquid:hover { transform: scale(1.05); }
        .btn-liquid:active { transform: scale(0.97); }

        @keyframes blobPulse {
            0%, 100% { d: path("M 80 160 C 40 130 20 80 50 50 C 70 30 100 20 150 30 C 200 40 260 20 300 40 C 350 60 380 90 370 130 C 360 165 330 180 290 185 C 250 190 200 200 160 195 C 120 190 100 175 80 160 Z"); }
            50% { d: path("M 75 155 C 35 125 15 75 48 48 C 72 28 105 18 155 28 C 205 38 258 22 305 42 C 355 62 385 95 372 135 C 359 168 326 183 286 188 C 246 193 196 205 155 198 C 114 191 95 172 75 155 Z"); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.8; r: 4; }
            50% { opacity: 0.3; r: 6; }
        }
        @keyframes sparkle2 {
            0%, 100% { opacity: 0.6; r: 3; }
            50% { opacity: 1; r: 5; }
        }
        .sp1 { animation: sparkle 2s ease-in-out infinite; }
        .sp2 { animation: sparkle2 2.5s ease-in-out infinite 0.5s; }
        .sp3 { animation: sparkle 3s ease-in-out infinite 1s; }
        .sp4 { animation: sparkle2 1.8s ease-in-out infinite 0.3s; }
    </style>
</head>
<body>

<button class="btn-liquid">
    <svg width="420" height="260" viewBox="0 0 420 260" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Cyan blob gradient -->
            <radialGradient id="blobCyan" cx="35%" cy="40%" r="65%">
                <stop offset="0%"   stop-color="rgba(60,200,180,0.85)"/>
                <stop offset="50%"  stop-color="rgba(80,160,200,0.65)"/>
                <stop offset="100%" stop-color="rgba(100,120,220,0.4)"/>
            </radialGradient>

            <!-- Pink blob gradient -->
            <radialGradient id="blobPink" cx="65%" cy="60%" r="60%">
                <stop offset="0%"   stop-color="rgba(200,80,180,0.75)"/>
                <stop offset="50%"  stop-color="rgba(160,60,200,0.55)"/>
                <stop offset="100%" stop-color="rgba(100,60,200,0.3)"/>
            </radialGradient>

            <!-- Mixed overlay -->
            <radialGradient id="blobMix" cx="50%" cy="50%" r="55%">
                <stop offset="0%"   stop-color="rgba(120,180,220,0.5)"/>
                <stop offset="60%"  stop-color="rgba(140,100,200,0.3)"/>
                <stop offset="100%" stop-color="rgba(80,60,160,0)"/>
            </radialGradient>

            <!-- Glass button fill -->
            <linearGradient id="glassBtn" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(180,220,240,0.3)"/>
                <stop offset="100%" stop-color="rgba(100,120,200,0.15)"/>
            </linearGradient>

            <!-- Button shine -->
            <linearGradient id="btnShine" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.5)"/>
                <stop offset="45%"  stop-color="rgba(255,255,255,0.1)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>

            <!-- Sparkle glow -->
            <filter id="spGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>

            <!-- Blur pro blobů -->
            <filter id="blobBlur" x="-10%" y="-10%" width="120%" height="120%">
                <feGaussianBlur stdDeviation="2"/>
            </filter>

            <clipPath id="btnClipL">
                <rect x="105" y="88" width="210" height="84" rx="16"/>
            </clipPath>
        </defs>

        <!-- Cyan blob (pozadí, vlevo nahoře) -->
        <ellipse cx="155" cy="125" rx="145" ry="100"
                 fill="url(#blobCyan)" opacity="0.9"/>

        <!-- Pink blob (pozadí, vpravo dole) -->
        <ellipse cx="270" cy="145" rx="130" ry="95"
                 fill="url(#blobPink)" opacity="0.85"/>

        <!-- Mix overlay -->
        <ellipse cx="210" cy="133" rx="160" ry="110"
                 fill="url(#blobMix)" opacity="0.6"/>

        <!-- Satelitní kapky -->
        <ellipse cx="120" cy="60" rx="22" ry="28" fill="rgba(80,200,190,0.7)" filter="url(#blobBlur)"/>
        <ellipse cx="80" cy="130" rx="18" ry="22" fill="rgba(100,160,220,0.65)" filter="url(#blobBlur)"/>
        <ellipse cx="85" cy="185" rx="14" ry="18" fill="rgba(180,80,200,0.6)" filter="url(#blobBlur)"/>
        <ellipse cx="310" cy="195" rx="20" ry="16" fill="rgba(80,180,200,0.65)" filter="url(#blobBlur)"/>
        <ellipse cx="350" cy="120" rx="16" ry="20" fill="rgba(200,80,180,0.6)" filter="url(#blobBlur)"/>
        <ellipse cx="300" cy="65" rx="12" ry="15" fill="rgba(120,200,180,0.55)" filter="url(#blobBlur)"/>

        <!-- Sparkle tečky -->
        <circle cx="122" cy="62" r="4" fill="white" class="sp1" filter="url(#spGlow)"/>
        <circle cx="230" cy="92" r="3.5" fill="white" class="sp2" filter="url(#spGlow)"/>
        <circle cx="88" cy="132" r="3" fill="rgba(180,230,255,0.9)" class="sp3" filter="url(#spGlow)"/>
        <circle cx="316" cy="198" r="4" fill="white" class="sp4" filter="url(#spGlow)"/>
        <circle cx="298" cy="68" r="2.5" fill="rgba(200,220,255,0.8)" class="sp1" filter="url(#spGlow)"/>

        <!-- Hlavní glass button -->
        <rect x="105" y="88" width="210" height="84" rx="16"
              fill="url(#glassBtn)"/>

        <!-- Horní shine -->
        <rect x="105" y="88" width="210" height="42" rx="16"
              fill="url(#btnShine)" clip-path="url(#btnClipL)"/>

        <!-- Okraj -->
        <rect x="105" y="88" width="210" height="84" rx="16"
              fill="none" stroke="rgba(200,230,255,0.7)" stroke-width="1.5"/>

        <!-- Vnitřní linka -->
        <rect x="109" y="92" width="202" height="76" rx="13"
              fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

        <!-- Text MENU -->
        <text x="210" y="138"
              font-family="'Inter', system-ui, sans-serif"
              font-size="28" font-weight="700"
              letter-spacing="4"
              text-anchor="middle"
              fill="white">MENU</text>
    </svg>
</button>

</body>
</html>
