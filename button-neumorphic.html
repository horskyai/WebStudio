<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-23: Neumorphic About Button</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #4a4a4a;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .btn-neu {
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.15s ease;
        }
        .btn-neu:hover { transform: scale(1.03); }
        .btn-neu:active { transform: scale(0.97); }
    </style>
</head>
<body>

<button class="btn-neu">
    <svg width="340" height="120" viewBox="0 0 340 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Hlavní fill — světle šedý -->
            <linearGradient id="neuFill" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"   stop-color="#f0f0f0"/>
                <stop offset="100%" stop-color="#d8d8d8"/>
            </linearGradient>

            <!-- Horní lesk -->
            <linearGradient id="neuShine" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="rgba(255,255,255,0.9)"/>
                <stop offset="40%"  stop-color="rgba(255,255,255,0.5)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>

            <!-- Tmavý shadow vlevo dole -->
            <filter id="neuShadowDark" x="-8%" y="-12%" width="120%" height="130%">
                <feDropShadow dx="-5" dy="5" stdDeviation="8" flood-color="rgba(50,50,50,0.5)"/>
            </filter>

            <!-- Světlý shadow vpravo nahoře -->
            <filter id="neuShadowLight" x="-8%" y="-12%" width="120%" height="130%">
                <feDropShadow dx="5" dy="-5" stdDeviation="8" flood-color="rgba(255,255,255,0.8)"/>
            </filter>

            <!-- Kombinovaný shadow -->
            <filter id="neuShadow" x="-12%" y="-18%" width="130%" height="145%">
                <feDropShadow dx="-6" dy="6" stdDeviation="10" flood-color="rgba(40,40,40,0.45)" result="dark"/>
                <feDropShadow dx="6" dy="-6" stdDeviation="10" flood-color="rgba(255,255,255,0.75)"/>
            </filter>

            <clipPath id="neuClip">
                <rect x="10" y="10" width="320" height="100" rx="22"/>
            </clipPath>
        </defs>

        <!-- Shadow layer -->
        <rect x="10" y="10" width="320" height="100" rx="22"
              fill="url(#neuFill)" filter="url(#neuShadow)"/>

        <!-- Hlavní tělo -->
        <rect x="10" y="10" width="320" height="100" rx="22"
              fill="url(#neuFill)"/>

        <!-- Horní lesk -->
        <rect x="10" y="10" width="320" height="50" rx="22"
              fill="url(#neuShine)" clip-path="url(#neuClip)"/>

        <!-- Velmi jemný border -->
        <rect x="10" y="10" width="320" height="100" rx="22"
              fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>

        <!-- Text ABOUT -->
        <text x="170" y="68"
              font-family="'Inter', system-ui, sans-serif"
              font-size="32" font-weight="400"
              letter-spacing="5"
              text-anchor="middle"
              fill="#555555">ABOUT</text>
    </svg>
</button>

</body>
</html>
